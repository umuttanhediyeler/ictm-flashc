<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İçtem Hukuk Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
    }

    .perspective-1000 {
      perspective: 1000px;
    }

    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .rotate-y-180 {
      transform: rotateY(180deg);
    }

    .preserve-3d {
      transform-style: preserve-3d;
    }

    /* Hide scrollbar for clean UI */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0?dev",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
    "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion } from 'framer-motion';
    import { ArrowLeft, ArrowRight, Shuffle, RotateCw, Repeat, BookOpen } from 'lucide-react';

    // --- CONSTANTS ---
    const APP_TITLE = "";
    const APP_SUBTITLE = "İçtem Hukuk x İstanbul Üniversitesi Kadın Hakları Kulübü Flashcard Çalışma Seti";

    const RAW_CSV_DATA = `Term (English),Term (Turkish),Practice Area
Syndicated Loan,Sendikasyon Kredisi,Banking & Finance
Collateralization,Teminatlandırma,Banking & Finance
Subordinated Debt,Sermaye Benzeri Borç,Banking & Finance
Debt Restructuring,Borç Yapılandırması,Banking & Finance
Letter of Guarantee,Teminat Mektubu,Banking & Finance
Project Finance,Proje Finansmanı,Banking & Finance
Promissory Note,Emre Muharrer Senet (Bono),Banking & Finance
Escrow Agreement,Emanet Sözleşmesi,Banking & Finance
Maturity Date,Vade Tarihi,Banking & Finance
Default Interest,Temerrüt Faizi,Banking & Finance
Share Purchase Agreement (SPA),Pay Devir Sözleşmesi,Mergers & Acquisitions
Due Diligence,Hukuki İnceleme / Durum Tespiti,Mergers & Acquisitions
Joint Venture,Ortak Girişim,Mergers & Acquisitions
Letter of Intent (LOI),Niyet Mektubu,Mergers & Acquisitions
Non-Disclosure Agreement (NDA),Gizlilik Sözleşmesi,Mergers & Acquisitions
Earn-out Provision,Ek Ödeme Koşulu,Mergers & Acquisitions
Anti-trust Clearance,Rekabet Kurumu İzni,Mergers & Acquisitions
Merger Agreement,Birleşme Sözleşmesi,Mergers & Acquisitions
Closing Conditions,Kapanış Koşulları,Mergers & Acquisitions
Hostile Takeover,Düşmanca Devralma,Mergers & Acquisitions
Arbitral Award,Hakem Kararı,Litigation and Arbitration
Precautionary Injunction,İhtiyati Tedbir,Litigation and Arbitration
Jurisdiction,Yargı Yetkisi / Görevli Mahkeme,Litigation and Arbitration
Plaintiff,Davacı,Litigation and Arbitration
Defendant,Davalı,Litigation and Arbitration
Burden of Proof,İspat Yükü,Litigation and Arbitration
Appellate Court,Temyiz / İstinaf Mahkemesi,Litigation and Arbitration
Mediation,Arabuluculuk,Litigation and Arbitration
Pleading,Dilekçe / Layiha,Litigation and Arbitration
Statute of Limitations,Zamanaşımı,Litigation and Arbitration
Articles of Association,Esas Sözleşme / Ana Sözleşme,Corporate General
Board of Directors,Yönetim Kurulu,Corporate General
General Assembly,Genel Kurul,Corporate General
Fiduciary Duty,Sadakat Yükümlülüğü,Corporate General
Capital Increase,Sermaye Artırımı,Corporate General
Liquidation,Tasfiye,Corporate General
Shareholder,Pay Sahibi / Ortak,Corporate General
Corporate Governance,Kurumsal Yönetim,Corporate General
Trade Registry,Ticaret Sicili,Corporate General
Dividend Distribution,Kar Payı Dağıtımı,Corporate General
Trademark Infringement,Marka İhlali,Intellectual Property
Copyright,Telif Hakkı,Intellectual Property
Patent Application,Patent Başvurusu,Intellectual Property
Trade Secret,Ticari Sır,Intellectual Property
Counterfeit Goods,Sahte / Taklit Ürün,Intellectual Property
License Agreement,Lisans Sözleşmesi,Intellectual Property
Industrial Design,Endüstriyel Tasarım,Intellectual Property
Royalties,İsim Hakkı Bedeli / Lisans Bedeli,Intellectual Property
Invalidation Action,Hükümsüzlük Davası,Intellectual Property
Unfair Competition,Haksız Rekabet,Intellectual Property
E-Commerce,Elektronik Ticaret,Internet Law
Domain Name Dispute,Alan Adı Uyuşmazlığı,Internet Law
Cybercrime,Siber Suç / Bilişim Suçu,Internet Law
Terms of Use,Kullanım Koşulları,Internet Law
Content Provider,İçerik Sağlayıcı,Internet Law
Hosting Provider,Yer Sağlayıcı,Internet Law
Access Ban,Erişim Engeli,Internet Law
Distance Selling Contract,Mesafeli Satış Sözleşmesi,Internet Law
Online Defamation,Çevrimiçi Hakaret / İtibar İhlali,Internet Law
Digital Signature,Dijital İmza,Internet Law
Data Controller,Veri Sorumlusu,Data Protection
Data Processor,Veri İşleyen,Data Protection
Explicit Consent,Açık Rıza,Data Protection
Privacy Policy,Gizlilik Politikası,Data Protection
Personal Data Breach,Kişisel Veri İhlali,Data Protection
Cross-border Data Transfer,Sınır Ötesi Veri Aktarımı,Data Protection
Right to be Forgotten,Unutulma Hakkı,Data Protection
Data Subject,İlgili Kişi,Data Protection
Anonymization,Anonimleştirme,Data Protection
Subject Access Request (SAR),İlgili Kişi Başvurusu,Data Protection
Compliance Program,Uyum Programı,Legal Seminars and Training
Legal Audit,Hukuki Denetim,Legal Seminars and Training
Regulatory Framework,Mevzuat Çerçevesi,Legal Seminars and Training
Code of Conduct,Davranış Kuralları,Legal Seminars and Training
Whistleblowing Policy,İhbar Politikası,Legal Seminars and Training
Anti-Bribery Regulations,Rüşveti Önleme Düzenlemeleri,Legal Seminars and Training
Mock Dawn Raid,Gölge Baskın (Rekabet Eğitimi),Legal Seminars and Training
Risk Management,Risk Yönetimi,Legal Seminars and Training
Corporate Social Responsibility,Kurumsal Sosyal Sorumluluk,Legal Seminars and Training
Mandatory Training,Zorunlu Eğitim,Legal Seminars and Training`;

    // --- UTILS ---
    const parseCSV = () => {
      const lines = [];
      let currentLine = '';
      let insideQuote = false;

      for (let i = 0; i < RAW_CSV_DATA.length; i++) {
        const char = RAW_CSV_DATA[i];
        if (char === '"') {
          insideQuote = !insideQuote;
          currentLine += char;
        } else if (char === '\n' && !insideQuote) {
          if (currentLine.trim()) lines.push(currentLine.trim());
          currentLine = '';
        } else {
          currentLine += char;
        }
      }
      if (currentLine.trim()) lines.push(currentLine.trim());

      const parsedCards = lines.map((line, index) => {
        const parts = [];
        let currentPart = '';
        let inQuote = false;

        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuote = !inQuote;
            continue;
          }

          if (char === ',' && !inQuote) {
            parts.push(currentPart.trim());
            currentPart = '';
          } else {
            currentPart += char;
          }
        }
        parts.push(currentPart.trim());

        if (parts.length >= 2) {
          return {
            id: `card-${index}`,
            question: parts[0],
            answer: parts[1],
            category: parts.length > 2 ? parts[2] : ''
          };
        }
        return null;
      }).filter(card => card !== null);

      // Remove header row if it exists
      if (parsedCards.length > 0 && parsedCards[0].question.toLowerCase().includes('term (english)')) {
        parsedCards.shift();
      }

      return parsedCards;
    };

    // --- COMPONENTS ---

    const Header = () => {
      return (
        <header className="w-full flex flex-col items-center justify-center py-6 px-2 md:px-4 text-center">
          <div className="flex items-center justify-center gap-2 md:gap-4 mb-2 max-w-full">
            <img
              src="https://raw.githubusercontent.com/umuttanhediyeler/ictm-flashc/main/ICTEM-LEGAL-YENI-LOGO.png"
              alt="İçtem Hukuk Logo"
              className="h-8 md:h-12 object-contain"
            />
            <h1 className="text-lg md:text-2xl font-bold text-slate-800 tracking-tight whitespace-nowrap">{APP_TITLE}</h1>
            <img
              src="https://raw.githubusercontent.com/umuttanhediyeler/ictm-flashc/main/slogo.png"
              alt="SLogo"
              className="h-8 md:h-12 object-contain"
            />
          </div>
          <p className="text-sm text-slate-500 font-medium">{APP_SUBTITLE}</p>
        </header>
      );
    };

    const ProgressBar = ({ current, total }) => {
      const percentage = Math.round(((current + 1) / total) * 100);

      return (
        <div className="w-full max-w-md mx-auto px-6 mb-6">
          <div className="flex justify-between text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">
            <span>İlerleme</span>
            <span>{current + 1} / {total}</span>
          </div>
          <div className="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
            <div
              className="bg-indigo-500 h-2 rounded-full transition-all duration-300 ease-out"
              style={{ width: `${percentage}%` }}
            />
          </div>
        </div>
      );
    };

    const Controls = ({ onNext, onPrev, onShuffle, onReset, hasPrev, hasNext }) => {
      return (
        <div className="flex items-center justify-between w-full max-w-md mx-auto mt-8 px-4 gap-4">
          <button
            onClick={onPrev}
            disabled={!hasPrev}
            className={`p-4 rounded-full shadow-lg transition-all transform active:scale-95 flex items-center justify-center
                ${hasPrev
                ? 'bg-white text-slate-700 hover:bg-slate-50 border border-slate-200'
                : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}
            aria-label="Önceki Kart"
          >
            <ArrowLeft size={24} />
          </button>

          <div className="flex gap-3">
            <button
              onClick={onShuffle}
              className="p-3 bg-indigo-100 text-indigo-600 rounded-xl hover:bg-indigo-200 transition-colors shadow-sm active:scale-95"
              title="Karıştır"
              aria-label="Kartları Karıştır"
            >
              <Shuffle size={20} />
            </button>
            <button
              onClick={onReset}
              className="p-3 bg-slate-200 text-slate-600 rounded-xl hover:bg-slate-300 transition-colors shadow-sm active:scale-95"
              title="Başa Dön"
              aria-label="Sıfırla"
            >
              <RotateCw size={20} />
            </button>
          </div>

          <button
            onClick={onNext}
            disabled={!hasNext}
            className={`p-4 rounded-full shadow-lg transition-all transform active:scale-95 flex items-center justify-center
                ${hasNext
                ? 'bg-indigo-600 text-white hover:bg-indigo-700 border-transparent shadow-indigo-200'
                : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}
            aria-label="Sonraki Kart"
          >
            <ArrowRight size={24} />
          </button>
        </div>
      );
    };

    const FlashcardComponent = ({ data, isFlipped, onFlip }) => {
      return (
        <div
          className="relative w-full max-w-md h-[400px] cursor-pointer perspective-1000 mx-auto"
          onClick={onFlip}
        >
          <motion.div
            className="w-full h-full relative preserve-3d"
            initial={false}
            animate={{ rotateY: isFlipped ? 180 : 0 }}
            // Improved smooth transition
            transition={{ duration: 0.6, type: "spring", stiffness: 180, damping: 20 }}
          >
            {/* Front Face */}
            <div
              className="absolute inset-0 w-full h-full bg-white rounded-2xl shadow-xl border border-slate-200 p-8 flex flex-col items-center justify-center backface-hidden"
            >
              <div className="absolute top-4 right-4 text-slate-300">
                <Repeat size={20} />
              </div>
              {data.category && (
                <div className="absolute top-4 left-4 px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-semibold max-w-[65%] truncate" title={data.category}>
                  {data.category}
                </div>
              )}
              <div className="flex flex-col items-center text-center space-y-4">
                <span className="text-xs font-bold tracking-widest text-slate-400 uppercase">Englısh Term</span>
                <h2 className="text-xl md:text-2xl font-semibold text-slate-800 leading-relaxed select-none">
                  {data.question}
                </h2>
              </div>
              <div className="absolute bottom-6 text-slate-400 text-sm animate-pulse">
                Çeviriyi gör
              </div>
            </div>

            {/* Back Face */}
            <div
              className="absolute inset-0 w-full h-full bg-slate-800 rounded-2xl shadow-xl p-8 flex flex-col items-center justify-center rotate-y-180 backface-hidden"
            >
              {data.category && (
                <div className="absolute top-4 left-4 px-3 py-1 bg-slate-700 text-slate-300 rounded-full text-xs font-semibold max-w-[65%] truncate" title={data.category}>
                  {data.category}
                </div>
              )}
              <div className="flex flex-col items-center text-center space-y-4">
                <span className="text-xs font-bold tracking-widest text-slate-400 uppercase">Turkısh Term</span>
                <p className="text-lg md:text-xl font-medium text-white leading-relaxed select-none">
                  {data.answer}
                </p>
              </div>
            </div>
          </motion.div>
        </div>
      );
    };

    // --- APP ---

    const App = () => {
      const [cards, setCards] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const data = parseCSV();
        setCards(data);
        setLoading(false);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') {
            handleNext();
          } else if (e.key === 'ArrowLeft') {
            handlePrev();
          } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
            handleFlip();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [currentIndex, isFlipped, cards.length]);

      const handleFlip = useCallback(() => {
        setIsFlipped((prev) => !prev);
      }, []);

      const handleNext = useCallback(() => {
        if (currentIndex < cards.length - 1) {
          setIsFlipped(false);
          setTimeout(() => setCurrentIndex((prev) => prev + 1), 150);
        }
      }, [currentIndex, cards.length]);

      const handlePrev = useCallback(() => {
        if (currentIndex > 0) {
          setIsFlipped(false);
          setTimeout(() => setCurrentIndex((prev) => prev - 1), 150);
        }
      }, [currentIndex]);

      const handleShuffle = useCallback(() => {
        setIsFlipped(false);
        setTimeout(() => {
          setCards((prevCards) => {
            const shuffled = [...prevCards];
            for (let i = shuffled.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
          });
          setCurrentIndex(0);
        }, 200);
      }, []);

      const handleReset = useCallback(() => {
        setIsFlipped(false);
        setTimeout(() => {
          const data = parseCSV();
          setCards(data);
          setCurrentIndex(0);
        }, 200);
      }, []);

      if (loading) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center">
            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
          </div>
        );
      }

      if (cards.length === 0) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 text-center">
            <h2 className="text-xl font-bold text-slate-800">Veri Bulunamadı</h2>
            <p className="text-slate-500 mt-2">Lütfen CSV verisini kontrol ediniz.</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100 selection:text-indigo-800 flex flex-col">
          <div className="flex-grow flex flex-col max-w-3xl mx-auto w-full pb-8">

            <Header />

            <ProgressBar current={currentIndex} total={cards.length} />

            <main className="flex-grow flex flex-col items-center justify-center px-4 md:px-0 perspective-1000">
              <FlashcardComponent
                data={cards[currentIndex]}
                isFlipped={isFlipped}
                onFlip={handleFlip}
              />
            </main>

            <Controls
              onNext={handleNext}
              onPrev={handlePrev}
              onShuffle={handleShuffle}
              onReset={handleReset}
              hasPrev={currentIndex > 0}
              hasNext={currentIndex < cards.length - 1}
            />

            <div className="text-center mt-6 text-slate-400 text-xs px-4">
              <p>Kartı çevirmek için üzerine tıklayın. Yön tuşları ile gezinebilirsiniz.</p>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
